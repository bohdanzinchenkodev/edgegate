apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgegate
  labels:
    app.kubernetes.io/name: edgegate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edgegate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgegate
    spec:
      serviceAccountName: edgegate
      containers:
        - name: edgegate
          image: {{ .Values.image }}:{{ .Values.tag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 80
