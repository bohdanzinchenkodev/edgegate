apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route
  namespace: default
spec:
  parentRefs:
    - name: edgegate
      sectionName: http
  rules:
    - backendRefs:
        - name: httpbin
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-route
  namespace: default
spec:
  parentRefs:
    - name: edgegate
      sectionName: https
  hostnames:
    - "app.example.com"
  rules:
    - backendRefs:
        - name: httpbin
          port: 8080
